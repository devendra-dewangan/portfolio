@if(profile(); as p)
{
  <nav class="fixed top-0 left-0 w-full backdrop-blur border-b border-gray-800 z-50">
    
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

      <!-- Logo / Name -->
      <h2 class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
        {{ p.name.split(" ")[0] }}
      </h2>

      <!-- Links -->
      <div class="hidden md:flex items-center gap-6 text-sm">

        <a routerLink="/" routerLinkActive="text-blue-400"
           class="text-gray-300 hover:text-blue-400 transition">
            Home
        </a>

        <a routerLink="/" routerLinkActive="text-blue-400"
           fragment="about" class="text-gray-300 hover:text-blue-400 transition">
          About
        </a>

        <a routerLink="/" fragment="project" routerLinkActive="text-blue-400"
           class="text-gray-300 hover:text-blue-400 transition">
          Project
        </a>

        <a routerLink="/" fragment="experience" routerLinkActive="text-blue-400"
           class="text-gray-300 hover:text-blue-400 transition">
          Experience
        </a>

        <a routerLink="/" fragment="education" routerLinkActive="text-blue-400"
           class="text-gray-300 hover:text-blue-400 transition">
          Education
        </a>

        <a routerLink="/" fragment="skills" routerLinkActive="text-blue-400"
           class="text-gray-300 hover:text-blue-400 transition">
          Skills
        </a>

        <a routerLink="/" fragment="contact" routerLinkActive="text-blue-400"
           class="text-gray-300 hover:text-blue-400 transition">
          Contact
        </a>

      </div>

      <!-- Mobile Menu Button -->
      <button 
        class="md:hidden text-gray-300"
        (click)="isOpen = !isOpen">
        ☰
      </button>

    </div>

    @if(isOpen){
        <div class="md:hidden px-6 pb-4 space-y-3 text-sm">
    
          <a routerLink="/" class="block text-gray-300" (click)="isOpen = !isOpen">Home</a>
          <a routerLink="/" routerLink="about" class="block text-gray-300" (click)="isOpen = !isOpen">About</a>
          <a routerLink="/" fragment="project" class="block text-gray-300" (click)="isOpen = !isOpen">Project</a>
          <a routerLink="/" fragment="experience" class="block text-gray-300" (click)="isOpen = !isOpen">Experience</a>
          <a routerLink="/" fragment="education" class="block text-gray-300" (click)="isOpen = !isOpen">Education</a>
          <a routerLink="/" fragment="skills" class="block text-gray-300" (click)="isOpen = !isOpen">Skills</a>
          <a routerLink="/" fragment="contact" class="block text-gray-300" (click)="isOpen = !isOpen">Contact</a>
        </div>
    }
    <!-- Mobile Menu -->

  </nav>
}
