@if(profile(); as p)
{
  <nav class="fixed top-0 left-0 w-full z-50 bg-black/30 backdrop-blur-xl border-b border-white/10 shadow-lg">

    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

      <!-- Logo -->
      <h2 appReveal="animate-nav" class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent 
                 ">
        {{ p.name.split(" ")[0] }}
      </h2>

      <!-- Desktop Links -->
      <div class="hidden md:flex items-center gap-8 text-sm font-medium">

        <a routerLink="/" routerLinkActive="text-cyan-400" appReveal="animate-nav" delay="0.2"
          class="relative text-gray-300 hover:text-cyan-400 transition group">
          Home
          <span class="absolute left-0 -bottom-1 w-0 h-[2px] bg-cyan-400 transition-all group-hover:w-full"></span>
        </a>

        <a routerLink="/" appReveal="animate-nav" delay="0.3" fragment="about" routerLinkActive="text-cyan-400"
          class="relative text-gray-300 hover:text-cyan-400 transition group">
          About
          <span class="absolute left-0 -bottom-1 w-0 h-[2px] bg-cyan-400 transition-all group-hover:w-full"></span>
        </a>

        <a routerLink="/" fragment="project" routerLinkActive="text-cyan-400" appReveal="animate-nav" delay="0.4"
          class="relative text-gray-300 hover:text-cyan-400 transition group">
          Projects
          <span class="absolute left-0 -bottom-1 w-0 bg-cyan-400 transition-all group-hover:w-full"></span>
        </a>

        <a routerLink="/" fragment="experience" routerLinkActive="text-cyan-400" appReveal="animate-nav" delay="0.5"
          class="relative text-gray-300 hover:text-cyan-400 transition group">
          Experience
          <span class="absolute left-0 -bottom-1 w-0 h-[2px] bg-cyan-400 transition-all group-hover:w-full"></span>
        </a>

        <a routerLink="/" fragment="education" routerLinkActive="text-cyan-400" appReveal="animate-nav" delay="0.6"
          class="relative text-gray-300 hover:text-cyan-400 transition group">
          Education
          <span class="absolute left-0 -bottom-1 w-0 h-[2px] bg-cyan-400 transition-all group-hover:w-full"></span>
        </a>

        <a routerLink="/" fragment="skills" routerLinkActive="text-cyan-400" appReveal="animate-nav" delay="0.7"
          class="relative text-gray-300 hover:text-cyan-400 transition group">
          Skills
          <span class="absolute left-0 -bottom-1 w-0 h-[2px] bg-cyan-400 transition-all group-hover:w-full"></span>
        </a>

        <a routerLink="/" fragment="contact" routerLinkActive="text-cyan-400" appReveal="animate-nav" delay="0.8"
          class="relative text-gray-300 hover:text-cyan-400 transition group">
          Contact
          <span class="absolute left-0 -bottom-1 w-0 h-[2px] bg-cyan-400 transition-all group-hover:w-full"></span>
        </a>

      </div>

      <!-- Mobile Button -->
      <button 
        class="md:hidden text-gray-300 text-2xl 
               animate-nav opacity-0 [animation-delay:0.9s]"
        (click)="isOpen = !isOpen">
        ☰
      </button>

    </div>

    <!-- Mobile Menu -->
    @if(isOpen){
      <div class="md:hidden px-6 pb-6 text-white">

        <div class="bg-white/5 backd rop-blur-lg border border-white/10 rounded-xl p-4 space-y-3 shadow-xl">

          <a routerLink="/" (click)="isOpen=false" appReveal="animate-nav"
            class="block px-3 py-2 rounded-lg hover:bg-cyan-500/10 transition">
            Home
          </a>

          <a routerLink="/" fragment="about" (click)="isOpen=false" appReveal="animate-nav" delay="0.2"
            class="block px-3 py-2 rounded-lg hover:bg-cyan-500/10 transition">
            About
          </a>

          <a routerLink="/" fragment="project" (click)="isOpen=false" appReveal="animate-nav" delay="0.3"
            class="block px-3 py-2 rounded-lg hover:bg-cyan-500/10 transition">
            Projects
          </a>

          <a routerLink="/" fragment="experience" (click)="isOpen=false" appReveal="animate-nav" delay="0.4"
            class="block px-3 py-2 rounded-lg hover:bg-cyan-500/10 transition">
            Experience
          </a>

          <a routerLink="/" fragment="education" (click)="isOpen=false" appReveal="animate-nav" delay="0.5"
            class="block px-3 py-2 rounded-lg hover:bg-cyan-500/10 transition">
            Education
          </a>

          <a routerLink="/" fragment="skills" (click)="isOpen=false" appReveal="animate-nav" delay="0.6"
            class="block px-3 py-2 rounded-lg hover:bg-cyan-500/10 transition">
            Skills
          </a>

          <a routerLink="/" fragment="contact" (click)="isOpen=false" appReveal="animate-nav" delay="0.7"
            class="block px-3 py-2 rounded-lg hover:bg-cyan-500/10 transition">
            Contact
          </a>

        </div>

      </div>
    }

  </nav>
}
