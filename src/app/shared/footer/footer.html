@if(profile(); as p){
    <div>
        <h3>About Me</h3>
        <ul>
            <li>{{p.name}}</li>
            <li>{{p.title}}</li>
            <li>{{p.skills.join(' | ')}}</li>
        </ul>
    </div>
    <div>
        <h3>Contact Me</h3>
        <ul>
            <li>{{p.email}}</li>
            <li>{{p.phone}}</li>
            <li>{{p.address}}</li>
        </ul>
    </div>
    <div>
        <h3>Social Media</h3>
        <ul>
        @for(s of p.socials;track s)
        {
            <li>
                <a [href]='s.link' target="_blank">{{s.name}}</a>
            </li>
        }
        </ul>
    </div>
    <div>
        <h3>Quick Links</h3>
        <div>
            <a routerLink="/home">Home</a>
            <a routerLink="/about">About</a>
        </div>
    </div>
}
