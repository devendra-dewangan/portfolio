<section class="min-h-screen bg-gray-950 flex items-center justify-center px-6 py-16 text-white">

  <div class="w-full max-w-lg bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-lg">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-center mb-6 text-blue-400">
      Contact Me
    </h2>

    <form class="space-y-6">

      <!-- Name -->
      <div class="relative">
        <input 
          type="text" 
          required
          class="w-full px-4 pt-5 pb-2 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 peer"
        >
        <label 
          class="absolute left-4 top-2 text-gray-400 text-sm transition-all 
                 peer-placeholder-shown:top-3.5 
                 peer-placeholder-shown:text-base 
                 peer-placeholder-shown:text-gray-500 
                 peer-focus:top-2 
                 peer-focus:text-sm 
                 peer-focus:text-blue-400">
          Name
        </label>
      </div>

      <!-- Email -->
      <div class="relative">
        <input 
          type="email" 
          required
          class="w-full px-4 pt-5 pb-2 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 peer"
        >
        <label 
          class="absolute left-4 top-2 text-gray-400 text-sm transition-all 
                 peer-placeholder-shown:top-3.5 
                 peer-placeholder-shown:text-base 
                 peer-placeholder-shown:text-gray-500 
                 peer-focus:top-2 
                 peer-focus:text-sm 
                 peer-focus:text-blue-400">
          Email
        </label>
      </div>

      <!-- Message -->
      <div class="relative">
        <textarea 
          rows="4"
          required
          class="w-full px-4 pt-5 pb-2 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 peer"
        ></textarea>
        <label 
          class="absolute left-4 top-2 text-gray-400 text-sm transition-all 
                 peer-placeholder-shown:top-3.5 
                 peer-placeholder-shown:text-base 
                 peer-placeholder-shown:text-gray-500 
                 peer-focus:top-2 
                 peer-focus:text-sm 
                 peer-focus:text-blue-400">
          Message
        </label>
      </div>

      <!-- Button -->
      <button 
        type="submit"
        class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition shadow-lg">
        Send Message
      </button>

    </form>

  </div>

</section>
