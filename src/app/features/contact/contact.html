@if(profile(); as p){

<section
  class="min-h-screen bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white px-6 py-20 flex items-center">

  <div class="max-w-6xl mx-auto w-full grid md:grid-cols-2 gap-16 items-center">

    <!-- LEFT SIDE -->
    <div class="space-y-7">

      <!-- Heading -->
      <h2 class="text-4xl md:text-5xl font-bold 
                 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
        Get in Touch
      </h2>

      <p class="text-gray-400 max-w-md leading-relaxed">
        Have a project in mind or want to collaborate? Feel free to reach out.
        I'm always open to discussing new ideas and opportunities.
      </p>

      <!-- Contact Info -->
      <div class="space-y-4">

        <div>
          <p class="text-xs text-gray-500 uppercase tracking-wider">Email</p>
          <p class="text-lg text-gray-200">{{p.email}}</p>
        </div>

        <div>
          <p class="text-xs text-gray-500 uppercase tracking-wider">Phone</p>
          <p class="text-lg text-gray-200">{{p.phone}}</p>
        </div>

      </div>

      <!-- Social -->
      <div class="flex gap-5 pt-4">
        @for(s of p.socials; track s){
        <a [href]="s.link" target="_blank"
          class="p-3 rounded-full bg-white/5 border border-white/10 
                 hover:bg-cyan-500/20 hover:scale-110 hover:border-cyan-400/40
                 transition">

          <img [ngSrc]="s.logo" width="20" height="20" [alt]="s.name"
            class="object-contain" />
        </a>
        }
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="relative">

      <!-- Glow -->
      <div class="absolute inset-0 bg-cyan-500/10 blur-3xl"></div>

      <!-- Card -->
      <div class="relative bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-8 shadow-2xl">

        <form class="space-y-6">

          <!-- Row -->
          <div class="grid md:grid-cols-2 gap-4">

            <!-- Name -->
            <div class="relative">
              <input type="text" required placeholder=" "
                class="w-full px-4 pt-5 pb-2 bg-white/5 border border-white/10 rounded-lg 
                       focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400
                       transition peer">
              <label class="absolute left-4 top-2 text-gray-400 text-sm transition-all 
                            peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-base
                            peer-focus:top-2 peer-focus:text-sm peer-focus:text-cyan-400">
                Name
              </label>
            </div>

            <!-- Email -->
            <div class="relative">
              <input type="email" required placeholder=" "
                class="w-full px-4 pt-5 pb-2 bg-white/5 border border-white/10 rounded-lg 
                       focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400
                       transition peer">
              <label class="absolute left-4 top-2 text-gray-400 text-sm transition-all 
                            peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-base
                            peer-focus:top-2 peer-focus:text-sm peer-focus:text-cyan-400">
                Email
              </label>
            </div>

          </div>

          <!-- Subject -->
          <div class="relative">
            <input type="text" required placeholder=" "
              class="w-full px-4 pt-5 pb-2 bg-white/5 border border-white/10 rounded-lg 
                     focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400
                     transition peer">
            <label class="absolute left-4 top-2 text-gray-400 text-sm transition-all 
                          peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-base
                          peer-focus:top-2 peer-focus:text-sm peer-focus:text-cyan-400">
              Subject
            </label>
          </div>

          <!-- Message -->
          <div class="relative">
            <textarea rows="4" required placeholder=" "
              class="w-full px-4 pt-5 pb-2 bg-white/5 border border-white/10 rounded-lg 
                     focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400
                     transition peer"></textarea>
            <label class="absolute left-4 top-2 text-gray-400 text-sm transition-all 
                          peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-base
                          peer-focus:top-2 peer-focus:text-sm peer-focus:text-cyan-400">
              Message
            </label>
          </div>

          <!-- Button -->
          <button type="submit"
            class="w-full py-3 rounded-full 
                   bg-gradient-to-r from-cyan-500 to-blue-600 
                   hover:scale-[1.02] hover:shadow-xl hover:shadow-cyan-500/30
                   active:scale-[0.98]
                   transition font-semibold">
            Send Message
          </button>

        </form>

      </div>

    </div>

  </div>

</section>
}
