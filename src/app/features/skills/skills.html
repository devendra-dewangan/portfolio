<section class="min-h-screen bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white px-6 py-20">

  <div class="max-w-6xl mx-auto text-center">

    <!-- Heading -->
    <h2 class="text-3xl md:text-4xl font-bold mb-4 
               bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
      What I Do
    </h2>

    <p class="text-gray-400 max-w-2xl mx-auto mb-16">
      I build modern web applications using scalable backend technologies and responsive frontend frameworks.
    </p>

    <!-- CATEGORY LOOP -->
    <div class="space-y-12">

      @for(item of skills(); track item.type)
      {
        <div>

          <!-- Category Title -->
          <h3 class="text-lg font-semibold text-cyan-400 mb-6 text-left">
            {{ item.type }}
          </h3>

          <!-- SKILLS GRID -->
          <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">

            @for(skill of item.skills; track skill.name)
            {
              <div
                class="group relative rounded-2xl p-6 
                       bg-white/5 backdrop-blur-xl border border-white/10
                       flex flex-col items-center justify-center
                       shadow-lg shadow-black/30
                       hover:-translate-y-2 hover:shadow-cyan-500/20
                       hover:border-cyan-400/30
                       transition duration-300 overflow-hidden">

                <!-- Glass Reflection -->
                <div class="absolute inset-0 bg-white/10 opacity-10 blur-2xl"></div>

                <!-- Glow Layer -->
                <div class="absolute inset-0 bg-gradient-to-br from-cyan-500/10 to-blue-500/10 
                            opacity-0 group-hover:opacity-100 transition blur-xl">
                </div>

                <!-- ICON -->
                <img 
                  [ngSrc]="skill.logoUrl"
                  width="50"
                  height="50"
                  [alt]="skill.name"
                  class="relative z-10 object-contain mb-4 
                         group-hover:scale-110 transition duration-300"
                >

                <!-- NAME -->
                <span class="relative z-10 text-sm text-gray-300 
                             group-hover:text-white transition">
                  {{ skill.name }}
                </span>

              </div>
            }

          </div>

        </div>
      }

    </div>

  </div>

</section>
