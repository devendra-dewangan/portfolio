<section class="min-h-screen bg-gray-950 text-white px-6 py-16">

  <div class="max-w-5xl mx-auto">

    <!-- Heading -->
    <h2 class="text-3xl md:text-4xl font-bold text-center mb-12">
      Education
    </h2>

    <!-- Timeline -->
    <div class="relative border-l border-gray-800 space-y-10">

      @for(e of education(); track e){

        <div class="relative pl-8">

          <!-- Dot -->
          <span class="absolute left-[-6px] top-2 w-3 h-3 bg-blue-500 rounded-full"></span>

          <!-- Card -->
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 shadow-lg hover:shadow-blue-500/10 transition">

            <!-- Top Section -->
            <div class="flex items-center gap-4 mb-4">

              <!-- Logo -->
              <img 
                [src]="e.institutelogo" 
                [alt]="e.institute"
                class="w-12 h-12 object-contain rounded-md bg-white p-1"
              >

              <!-- Institute Info -->
              <div>
                <h3 class="text-lg font-semibold text-blue-400">
                  {{ e.institute }}
                </h3>
                <p class="text-sm text-gray-400">
                  {{ e.specialization }}
                </p>
              </div>

            </div>

            <!-- Meta Info -->
            <div class="flex justify-between text-sm text-gray-400 mb-4">
              <span>{{ e.yearofpassing }}</span>
              <span class="px-2 py-1 bg-gray-800 border border-gray-700 rounded text-xs">
                {{ e.percentage }}
              </span>
            </div>

            <!-- Description -->
            <ul class="space-y-2 text-gray-300 text-sm">
              @for(d of e.description; track d){
                <li class="flex gap-2">
                  <span class="text-blue-500">•</span>
                  <span>{{ d }}</span>
                </li>
              }
            </ul>

          </div>

        </div>

      }

    </div>

  </div>

</section>
