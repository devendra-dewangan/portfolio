@if(profile(); as p){

<section class="h-full w-full grid md:grid-cols-2 bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white">

  <!-- LEFT SIDE -->
  <div class="flex items-center px-6 md:px-12 lg:px-32">

    <div class="space-y-7 max-w-xl">

      <!-- Small Heading -->
      <p class="text-gray-500 text-xs tracking-[0.3em] uppercase 
                animate-slide-down opacity-0 delay-1000">
        Welcome to my portfolio
      </p>

      <!-- Name + Role -->
      <h1 class="text-5xl md:text-6xl font-extrabold leading-tight 
                 animate-slide-left  [animation-delay:0.3s]">

        <span class="bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
          {{ p.name }}
        </span><br />

        <span class="text-cyan-400 text-2xl md:text-3xl font-semibold">
          {{ p.role }}
        </span>

      </h1>

      <!-- Summary -->
      <p class="text-gray-300 text-lg leading-relaxed 
                animate-slide-left opacity-0 delay-1000 [animation-delay:0.5s]">
        {{ p.summary }}
      </p>

      <!-- Skills -->
      <div class="flex flex-wrap gap-3 pt-2 
                  animate-slide-left opacity-0 [animation-delay:0.6s]">
        @for(skill of p.skills; track skill){
          <span class="px-4 py-1.5 text-sm bg-white/5 border border-white/10 rounded-full backdrop-blur-md 
                       hover:bg-cyan-500/10 hover:border-cyan-400 transition">
            {{ skill }}
          </span>
        }
      </div>

      <!-- Buttons -->
      <div class="flex gap-4 pt-6 flex-wrap 
                  animate-slide-up [animation-delay:0.7s]">

        <!-- Download CV -->
        <a [href]="p.cvLink" download
          class="px-6 py-3 rounded-full bg-gradient-to-r from-cyan-500 to-blue-600 
                 hover:scale-105 transition shadow-xl shadow-cyan-500/30 font-semibold">
          Download CV
        </a>

        <!-- Projects -->
        <a routerLink="/" fragment="project"
          class="px-6 py-3 rounded-full border border-white/20 
                 hover:bg-white/10 transition">
          See My Work
        </a>

      </div>

      <!-- Social Icons -->
      <div class="flex gap-5 pt-4 
                  animate-slide-up opacity-0 [animation-delay:0.9s]">
        @for(s of p.socials; track s){
          <a [href]="s.link" target="_blank"
            class="p-2 rounded-full bg-white/5 border border-white/10 
                   hover:bg-cyan-500/20 hover:scale-110 transition">

            <img [ngSrc]="s.logo" width="22" height="22" [alt]="s.name"
              class="object-contain" />
          </a>
        }
      </div>

    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="hidden md:block relative h-screen animate-slide-right { [animation-delay:0.4s]">

    <!-- IMAGE -->
    <img 
      ngSrc="assets/images/profile.png"
      alt="profile"
      width="1024"
      height="1536"
      class="w-full h-full object-cover 
             brightness-105 contrast-110 
             hover:scale-105 transition duration-700"
    />

    <!-- GRADIENT OVERLAY (FIXED) -->
    <div class="absolute inset-0 bg-gradient-to-l from-black/50 via-black/20 to-transparent"></div>

  </div>

</section>
}
