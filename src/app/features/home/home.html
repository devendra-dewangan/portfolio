@if(profile(); as p){

<section class="min-h-screen w-full bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white flex items-center px-6">

  <div class="max-w-7xl mx-auto w-full grid md:grid-cols-2 gap-16 items-center">

    <!-- LEFT CONTENT -->
    <div class="space-y-7">

      <!-- Small Heading -->
      <p class="text-gray-500 text-xs tracking-[0.3em] uppercase">
        Welcome to my portfolio
      </p>

      <!-- Name + Role -->
      <h1 class="text-5xl md:text-6xl font-extrabold leading-tight">
        <span class="bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
          {{ p.name }}
        </span><br />

        <span class="text-cyan-400 text-2xl md:text-3xl font-semibold">
          {{ p.role }}
        </span>
      </h1>

      <!-- Summary -->
      <p class="text-gray-300 text-lg leading-relaxed max-w-xl">
        {{ p.summary }}
      </p>

      <!-- Skills -->
      <div class="flex flex-wrap gap-3 pt-2">
        @for(skill of p.skills; track skill){
        <span class="px-4 py-1.5 text-sm bg-white/5 border border-white/10 rounded-full backdrop-blur-md hover:bg-cyan-500/10 hover:border-cyan-400 transition">
          {{ skill }}
        </span>
        }
      </div>

      <!-- Buttons -->
      <div class="flex gap-4 pt-6 flex-wrap">

        <!-- Download CV -->
        <a [href]="p.cvLink" download
          class="px-6 py-3 rounded-full bg-gradient-to-r from-cyan-500 to-blue-600 
                 hover:scale-105 transition shadow-xl shadow-cyan-500/30 font-semibold">
          Download CV
        </a>

        <!-- Projects -->
        <a routerLink="/" fragment="project"
          class="px-6 py-3 rounded-full border border-white/20 
                 hover:bg-white/10 transition">
          See My Work
        </a>

      </div>

      <!-- Social Icons -->
      <div class="flex gap-5 pt-4">
        @for(s of p.socials; track s){
        <a [href]="s.link" target="_blank"
          class="p-2 rounded-full bg-white/5 border border-white/10 
                 hover:bg-cyan-500/20 hover:scale-110 transition">

          <img [ngSrc]="s.logo" width="22" height="22" [alt]="s.name"
            class="object-contain" />
        </a>
        }
      </div>

    </div>

    <!-- RIGHT IMAGE (PREMIUM LOOK) -->
    <div class="hidden md:flex justify-center items-center relative">

      <!-- Glow -->
      <div class="absolute w-96 h-96 bg-cyan-500/20 blur-3xl rounded-full"></div>

      <!-- Image Card -->
      <div class="relative rounded-2xl overflow-hidden shadow-2xl border border-white/10 backdrop-blur-lg">

        <img ngSrc="assets/images/profile.png" 
          alt="profile" 
          width="1024" 
          height="1536"
          class="w-[350px] md:w-[420px] lg:w-[480px] 
                 object-cover 
                 brightness-105 contrast-110 
                 hover:scale-105 transition duration-500" />

      </div>

    </div>

  </div>

</section>

}

<app-about />
<app-projects />
<app-experience />
<app-education />
<app-skills />
<app-contact />
