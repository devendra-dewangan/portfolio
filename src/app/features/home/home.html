@if(profile(); as p){

<section 
  class="min-h-screen w-full bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white flex items-center px-6">

  <div class="max-w-7xl mx-auto w-full grid md:grid-cols-2 gap-12 items-center">

    <!-- LEFT -->
    <div class="space-y-6">

      <!-- Small Heading -->
      <p class="text-gray-400 text-sm tracking-widest uppercase">
        Hello, It’s Me
      </p>

      <!-- Name -->
      <h1 class="text-5xl md:text-6xl font-extrabold leading-tight">
        <span class="text-white">{{ p.name }}</span><br />

        <span class="text-cyan-400 text-2xl md:text-3xl font-semibold">
          {{ p.role }}
        </span>
      </h1>

      <!-- Summary -->
      <p class="text-gray-300 text-lg leading-relaxed max-w-xl">
        {{ p.summary }}
      </p>

      <!-- Skills -->
      <div class="flex flex-wrap gap-2">
        @for(skill of p.skills; track skill){
          <span
            class="px-3 py-1 text-sm bg-gray-800 border border-gray-700 rounded-full hover:bg-gray-700 transition">
            {{ skill }}
          </span>
        }
      </div>

      <!-- Social Icons -->
      <div class="flex gap-4 text-xl text-gray-400 pt-2">
        <a [href]="p.linkedin" target="_blank" class="hover:text-cyan-400 transition">
          <i class="fab fa-linkedin"></i>
        </a>
        <a [href]="p.github" target="_blank" class="hover:text-cyan-400 transition">
          <i class="fab fa-github"></i>
        </a>
        <a [href]="p.twitter" target="_blank" class="hover:text-cyan-400 transition">
          <i class="fab fa-twitter"></i>
        </a>
      </div>

      <!-- Buttons -->
      <div class="flex gap-4 pt-4">

        <!-- Download CV -->
        <a
          [href]="p.cvLink"
          download
          class="px-6 py-3 bg-cyan-500 hover:bg-cyan-600 text-black font-semibold rounded-lg shadow-lg shadow-cyan-500/30 transition">
          Download CV
        </a>

        <!-- Scroll to Projects -->
        <a
          routerLink="/"
          fragment="project"
          class="px-6 py-3 border border-cyan-500 text-cyan-400 hover:bg-cyan-500 hover:text-black rounded-lg transition cursor-pointer">
          See My Work
        </a>

      </div>

    </div>

    <!-- RIGHT IMAGE -->
    <div class="hidden md:flex justify-center items-center">

      <div class="relative">

        <!-- Glow -->
        <div class="absolute inset-0 bg-cyan-500 blur-3xl opacity-30 rounded-full"></div>

        <!-- Image Card -->
        <div
          class="relative w-72 h-80 bg-gray-900 rounded-2xl border border-cyan-500/30 overflow-hidden shadow-xl">

          <img
            [src]="p.image"
            alt="profile"
            class="w-full h-full object-cover" />

        </div>

      </div>

    </div>

  </div>

</section>

}

<app-about/>

<app-projects/>

<app-experience/>
<app-education/>
<app-skills/>
<app-contact/>
