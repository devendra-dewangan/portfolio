<section class="min-h-screen xl:min-h-screen lg:min-h-svw bg-gradient-to-br w-full grid md:grid-cols-2 from-gray-950 via-gray-900 to-black text-white">
@if(profile(); as p)
{

  <!-- LEFT SIDE -->
  <div class="flex items-center px-6 md:px-12 lg:pl-32">

    <div class="space-y-7 max-w-xl">

      <!-- Small Heading -->
      <p appReveal="animate-slide-down" class="text-gray-500 text-xs tracking-[0.3em] uppercase">
        Welcome to my portfolio
      </p>

      <!-- Name + Role -->
      <h1 appReveal="animate-slide-left" class="text-5xl md:text-6xl font-extrabold leading-tight ">

        <span class="bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
          {{ p.name }}
        </span><br />

      </h1>

      <!-- Summary -->
      <p appReveal="animate-slide-left" delay="0.3" class="text-gray-300 text-lg leading-relaxed 
                  ">
        {{ p.summary }}
      </p>

      <!-- Skills -->
      <div class="flex flex-wrap gap-3 pt-2">
        @for(skill of p.skills; track skill; let i = $index){
        <span appReveal="animate-slide-up" delay="{{i/10}}" class="px-4 py-1.5 text-sm bg-white/5 border border-white/10 rounded-full backdrop-blur-md 
                       hover:bg-cyan-500/10 hover:border-cyan-400 transition">
          {{ skill }}
        </span>
        }
      </div>

      <!-- Buttons -->
      <div class="flex gap-4 pt-6 flex-wrap 
                  ">

        <!-- Download CV -->
        <a [href]="p.cvLink" download appReveal="animate-slide-up" delay="0.3" class="px-6 py-3 rounded-full bg-gradient-to-r from-cyan-500 to-blue-600 
                 hover:scale-105 transition shadow-xl shadow-cyan-500/30 font-semibold">
          Download CV
        </a>

        <!-- Projects -->
        <a routerLink="/" fragment="project" appReveal="animate-slide-up" delay="0.5" class="px-6 py-3 rounded-full border border-white/20 
                 hover:bg-white/10 transition">
          See My Work
        </a>

      </div>

      <!-- Social Icons -->
      <div class="flex gap-5 pt-4">
        @for (s of p.socials; track s; let i = $index) {

        <a [href]="s.link" target="_blank" appReveal="animate-slide-up" delay="{{i/10 + 0.3}}" class="p-2 rounded-full bg-white/5 text-gray-300 border border-white/10 
             hover:bg-cyan-500/20 hover:scale-110 transition">

          <svg [attr.viewBox]="s.viewBox" fill="currentColor" class="w-9 h-9">

            <path [attr.d]="s.path"></path>

          </svg>

        </a>

        }
      </div>

    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div appReveal="animate-slide-right" delay="0.3" class="hidden md:block relative h-full">

    <!-- IMAGE -->
    <img ngSrc="assets/images/profile.png" alt="profile" width="1024" height="1536" class="lg:w-full md:h-full object-cover 
             brightness-105 contrast-110 
             hover:scale-105 transition duration-700" />

    <!-- GRADIENT OVERLAY (FIXED) -->
    <div class="absolute inset-0 bg-gradient-to-l from-black/50 via-black/20 to-transparent"></div>

  </div>

}
</section>
