<section class="h-full bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white px-6 py-20">

  <div class="max-w-6xl mx-auto">

    <!-- Heading -->
    <h2 class="text-3xl md:text-4xl font-bold text-center mb-20 
               bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
      Experience
    </h2>

    <!-- Timeline Wrapper -->
    <div class="relative">

      <!-- Center Line -->
      <div class="absolute left-1/2 top-0 -translate-x-1/2 w-[2px] h-full hidden md:block
                  bg-gradient-to-b from-cyan-500/40 via-blue-500/30 to-transparent">
      </div>

      <div class="space-y-6 md:space-y-16">

        @for (e of experience(); track e; let i = $index) {

          <div class="relative grid md:grid-cols-2 items-center">

            <!-- LEFT / RIGHT CARD -->
            <div [appReveal]="i % 2 === 0 ? 'animate-slide-right' : 'animate-slide-left'"
                 [class]="i % 2 === 0 ? 'md:pr-12' : 'md:pl-12'"
                 [class.md:text-right]="i % 2 === 0"
                 [class.md:order-1]="i % 2 !== 0">

              <div class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl p-6 
                          shadow-xl hover:shadow-cyan-500/10 
                          hover:-translate-y-2 transition duration-300">

                <!-- Company + Logo -->
                <div class="flex items-center gap-3 mb-2"
                     [class.md:flex-row-reverse]="i % 2 === 0">

                  <img 
                    [src]="e.logo" 
                    alt="logo"
                    class="w-8 h-8 object-contain rounded bg-white p-1"
                  />

                  <h3 class="text-lg font-semibold text-cyan-400">
                    {{ e.company }}
                  </h3>

                </div>

                <!-- Location -->
                <p class="text-gray-400 text-sm mb-1">
                  {{ e.location }}
                </p>

                <!-- Role -->
                <p class="text-gray-200 font-medium">
                  {{ e.title }}
                </p>

                <!-- Duration -->
                <p class="text-sm text-gray-500 mb-4">
                  {{ e.startdate }} - {{ e.enddate || 'Present' }}
                </p>

              </div>

            </div>

            <!-- CENTER DOT WITH LOGO -->
            <div class="absolute left-1/2 -translate-x-1/2  hidden md:block">
              <span class="w-4 h-4 bg-cyan-400 rounded-full 
                           shadow-lg shadow-cyan-500/50 
                           ring-4 ring-cyan-500/10 block">
              </span>
            </div>

            <!-- EMPTY SIDE -->
            <div class="md:pl-12 hidden md:block"></div>

          </div>

        }

      </div>

    </div>

  </div>

</section>
