<section class="min-h-screen bg-gray-950 text-white px-6 py-16">

  <div class="max-w-5xl mx-auto">

    <!-- Heading -->
    <h2 class="text-3xl md:text-4xl font-bold text-center mb-12">
      Experience
    </h2>

    <!-- Timeline -->
    <div class="relative border-l border-gray-800 space-y-10">

      @for (e of experience(); track e) {

        <div class="relative pl-8">

          <!-- Dot -->
          <span class="absolute left-[-6px] top-2 w-3 h-3 bg-blue-500 rounded-full shadow-lg shadow-blue-500/50"></span>

          <!-- Card -->
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 shadow-lg hover:shadow-blue-500/10 hover:-translate-y-1 transition duration-300">

            <!-- Company + Location -->
            <h3 class="text-lg font-semibold text-blue-400">
              {{ e.company }} 
              <span class="text-gray-400 text-sm">• {{ e.location }}</span>
            </h3>

            <!-- Role -->
            <p class="text-gray-300 font-medium mt-1">
              {{ e.title }}
            </p>

            <!-- Duration -->
            <p class="text-sm text-gray-500 mb-4">
              {{ e.startdate }} - {{ e.enddate || 'Present' }}
            </p>

            <!-- Description -->
            <ul class="space-y-2 text-gray-300 text-sm">
              @for (d of e.description; track d) {
                <li class="flex gap-2">
                  <span class="text-blue-500">•</span>
                  <span>{{ d }}</span>
                </li>
              }
            </ul>

          </div>

        </div>

      }

    </div>

  </div>

</section>
