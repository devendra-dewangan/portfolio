<section class="min-h-screen bg-gray-950 text-white px-6 py-16">

  <div class="max-w-6xl mx-auto">

    <!-- Heading -->
    <h2 class="text-3xl md:text-4xl font-bold mb-10 text-center">
      My Projects
    </h2>

    <!-- Grid -->
    <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">

      @for (p of project(); track p) {

        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-lg hover:shadow-blue-500/10 transition duration-300">
          
          <!-- Project Name -->
          <h3 class="text-xl font-semibold mb-2 text-blue-400">
            {{ p.name }}
          </h3>

          <!-- Date + Status -->
          <div class="flex justify-between text-sm text-gray-400 mb-4">
            <span>{{ p.completiondate }}</span>
            <span class="px-2 py-1 rounded bg-gray-800 border border-gray-700 text-xs">
              {{ p.status }}
            </span>
          </div>

          <!-- Description -->
          <ul class="space-y-2 text-gray-300 text-sm">
            @for (d of p.description; track d) {
              <li class="flex items-start gap-2">
                <span class="text-blue-500">•</span>
                <span>{{ d }}</span>
              </li>
            }
          </ul>

        </div>

      }

    </div>

  </div>

</section>
